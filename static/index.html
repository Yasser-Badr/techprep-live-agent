<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPrep Live Agent</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <h1>TechPrep Live Agent 🤖</h1>
        <p>Live Audio Interview & Code Review</p>
        
        <div class="controls">
            <button id="startBtn">Start Audio Interview</button>
            <button id="stopBtn" disabled>End Interview</button>
        </div>
        <p id="status">Status: Waiting to start...</p>

        <div id="fileUploadSection">
            <h3>Upload your code file for review 📁 <span style="color: #aaa; font-size: 14px;">(Optional)</span></h3>
            <p style="font-size: 13px; color: #ccc; margin-top: 0;">You can just talk to the AI, or share a code file to discuss it!</p>
            <input type="file" id="codeFileInput" accept=".go,.js,.py,.html,.css,.json,.txt" />
            <button id="sendFileBtn">Share Code with Agent</button>
        </div>

        <div id="codeViewerSection" style="display: none;">
            <h3>Live Code Viewer 💻</h3>
            <pre><code id="codeDisplay"></code></pre>
        </div>
        
        <div id="chatBox">Terminal Logs:<br></div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>

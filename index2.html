<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPrep Live Agent</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #1e1e1e; color: white; margin: 0; padding: 20px; }
        h1 { color: #4CAF50; margin-bottom: 5px; }
        .container { max-width: 800px; margin: auto; }
        video { width: 100%; max-height: 400px; border-radius: 8px; background: #000; border: 2px solid #333; margin-bottom: 20px; }
        .controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; transition: 0.3s; }
        #startBtn { background-color: #4CAF50; color: white; }
        #startBtn:hover { background-color: #45a049; }
        #stopBtn { background-color: #f44336; color: white; }
        #stopBtn:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        #status { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        #chatBox { background: #2c2c2c; padding: 15px; border-radius: 8px; text-align: left; height: 150px; overflow-y: auto; font-family: monospace; color: #00ffcc; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TechPrep Live Agent 🤖</h1>
        <p>Two-Brain Architecture (Voice + Vision)</p>
        
        <video id="screenVideo" autoplay muted></video>
        <canvas id="hiddenCanvas" style="display:none;"></canvas>
        
        <div class="controls">
            <button id="startBtn">Start Interview</button>
            <button id="stopBtn" disabled>End Interview</button>
        </div>
        <p id="status">Status: Waiting to start...</p>
        
        <div id="chatBox">System Logs:<br></div>
    </div>

    <script>
        // ⚠️ هام جداً: حط مفتاح الـ API بتاعك هنا عشان العقل التاني (الرؤية) يشتغل
        const GEMINI_API_KEY = "حط_الـ_API_KEY_بتاعك_هنا";

        const screenVideo = document.getElementById('screenVideo');
        const hiddenCanvas = document.getElementById('hiddenCanvas');
        const ctx = hiddenCanvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatBox');
        
        let ws;
        let screenStream;
        let micStream;
        let audioCtx;
        let inputCtx;
        let processor;
        let nextPlayTime = 0;
        let visionInterval;

        function logToChat(message) {
            chatBox.innerHTML += `> ${message}<br>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        startBtn.onclick = async () => {
            if (GEMINI_API_KEY === "AIzaSyBFJnPfgUjjbGu2Hu1u6vH1e4u6_ffzWZk") {
                alert("Please add your Gemini API Key in the HTML code first!");
                return;
            }

            try {
                statusText.innerText = "Status: Requesting permissions...";
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                screenVideo.srcObject = screenStream;
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                nextPlayTime = audioCtx.currentTime;

                ws = new WebSocket('ws://' + window.location.host + '/ws');

                ws.onopen = () => {
                    statusText.innerText = "Status: Connected (Two-Brain System Active) 🧠🎤👀";
                    statusText.style.color = "#4CAF50";
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    
                    logToChat("Connected! Voice active. Vision active.");
                    startMicCapture();
                    startVisionBrain(); // تشغيل العقل التاني
                };

                ws.onmessage = async (event) => {
                    try {
                        let data = event.data;
                        if (data instanceof Blob) data = await data.text();
                        const response = JSON.parse(data);
                        
                        if (response.serverContent && response.serverContent.modelTurn) {
                            const parts = response.serverContent.modelTurn.parts;
                            for (let part of parts) {
                                if (part.text) logToChat("Agent: " + part.text);
                                if (part.inlineData && part.inlineData.data) playPCMAudio(part.inlineData.data);
                            }
                        }
                    } catch (e) { console.error("Error:", e); }
                };

                ws.onclose = () => {
                    statusText.innerText = "Status: Disconnected ❌";
                    statusText.style.color = "#f44336";
                    resetUI();
                };

            } catch (err) {
                console.error('Error:', err);
                resetUI();
            }
        };

        stopBtn.onclick = () => {
            if (ws) ws.close();
            resetUI();
        };

        function resetUI() {
            if (screenStream) screenStream.getTracks().forEach(t => t.stop());
            if (micStream) micStream.getTracks().forEach(t => t.stop());
            if (processor) processor.disconnect();
            if (inputCtx) inputCtx.close();
            if (visionInterval) clearInterval(visionInterval);
            screenVideo.srcObject = null;
            startBtn.disabled = false;
            stopBtn.disabled = true;
        }

        function startMicCapture() {
            inputCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const source = inputCtx.createMediaStreamSource(micStream);
            processor = inputCtx.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = (e) => {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                const inputData = e.inputBuffer.getChannelData(0);
                const pcm16 = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) pcm16[i] = Math.max(-1, Math.min(1, inputData[i])) * 32767;
                
                const uint8 = new Uint8Array(pcm16.buffer);
                let binary = '';
                for (let i = 0; i < uint8.length; i++) binary += String.fromCharCode(uint8[i]);
                
                ws.send(JSON.stringify({
                    realtimeInput: { mediaChunks: [{ mimeType: "audio/pcm;rate=16000", data: window.btoa(binary) }] }
                }));
            };

            const gainNode = inputCtx.createGain();
            gainNode.gain.value = 0;
            source.connect(processor);
            processor.connect(gainNode);
            gainNode.connect(inputCtx.destination);
        }

        // 🧠 العقل التاني: التقاط الشاشة وإرسالها لـ Gemini Vision
        function startVisionBrain() {
            visionInterval = setInterval(async () => {
                if (!ws || ws.readyState !== WebSocket.OPEN || !screenVideo.videoWidth) return;

                hiddenCanvas.width = screenVideo.videoWidth;
                hiddenCanvas.height = screenVideo.videoHeight;
                ctx.drawImage(screenVideo, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
                const base64Image = hiddenCanvas.toDataURL('image/jpeg', 0.5).split(',')[1];

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
                    const payload = {
                        contents: [{
                            parts: [
                                {text: "Analyze this screenshot of a developer's workspace. If code is visible, summarize what the code is doing, the programming language, and any key functions. Keep it very concise (2-3 sentences max)."},
                                {inlineData: {mimeType: "image/jpeg", data: base64Image}}
                            ]
                        }]
                    };

                    const response = await fetch(url, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload) 
                    });
                    
                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        const description = data.candidates[0].content.parts[0].text;
                        logToChat("👁️ Assistant updated the Tech Lead about your screen.");
                        
                        // إرسال الملاحظة بصيغة "المساعد" عشان الموديل الصوتي ميقاوحش
                        const contextMsg = {
                            clientContent: {
                                turns: [{
                                    role: "user",
                                    parts: [{ text: `[Assistant's Screen Update: The candidate's screen currently shows: ${description}]` }]
                                }],
                                turnComplete: false 
                            }
                        };
                        ws.send(JSON.stringify(contextMsg));
                    }
                } catch (err) {
                    console.error("Vision Brain Error:", err);
                }
            }, 8000); 
        }

        async function playPCMAudio(base64) {
            if (!audioCtx) return;
            const binaryString = window.atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const int16Array = new Int16Array(bytes.buffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) float32Array[i] = int16Array[i] / 32768.0;

            const buffer = audioCtx.createBuffer(1, float32Array.length, 24000);
            buffer.getChannelData(0).set(float32Array);
            
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.connect(audioCtx.destination);

            if (nextPlayTime < audioCtx.currentTime) nextPlayTime = audioCtx.currentTime;
            source.start(nextPlayTime);
            nextPlayTime += buffer.duration;
        }
    </script>
</body>
</html>
